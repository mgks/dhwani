<body>
    <div class="header-container tool-header">
    
        <div class="tool-nav-wrapper">
            <a href="/" class="brand-link">Dhwani</a>
            <span class="tool-name-label">Metronome</span>
        </div>
    

    
    <button aria-label="Toggle Dark Mode" class="theme-btn-header theme-toggle">
        <!-- Sun Icon (Visible in Dark Mode) -->
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>

        </svg>
    </button>
    
</div>


    <main class="metronome-container">
        <div class="beat-visualizer glass">
            <div id="beat-dot" class="dot"></div>
        </div>

        <div id="frequency-display" class="bpm-display">
            <span id="bpm-value">120</span>
            <span class="label">BPM</span>
        </div>

        <div class="metronome-controls glass">
            <button id="bpm-minus" class="btn-round">-</button>
            <input type="range" id="bpm-slider" min="40" max="240" value="120">
            <button id="bpm-plus" class="btn-round">+</button>
        </div>

        <button id="start-stop-btn" class="glass action-btn">Start</button>
    </main>
