    <div class="header-container tool-header">
    
        <div class="tool-nav-wrapper">
            <a href="/" class="brand-link">Dhwani</a>
            <span class="tool-name-label">Tanpura</span>
        </div>
    

    
    <button aria-label="Toggle Dark Mode" class="theme-btn-header theme-toggle">
        <!-- Sun Icon (Visible in Dark Mode) -->
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>

    </button>
    
</div>
    <main class="tanpura-container">
        <div class="drone-visualizer-strings">
            <div class="drone-string s1"></div>
            <div class="drone-string s2"></div>
            <div class="drone-string s3"></div>
            <div class="drone-string s4"></div>
        </div>

        <div id="frequency-display" class="frequency-display glass">
            <span id="hz-value">240</span> <span class="label">Hz</span>
        </div>

        <div class="tanpura-controls glass">
             <div class="label-heading">Base Pitch (Sa)</div>
             <div class="preset-group">
                <button class="preset-btn" data-hz="220">A</button>
                <button class="preset-btn active" data-hz="240">C</button>
                <button class="preset-btn" data-hz="261">C#</button>
                <button class="preset-btn" data-hz="293">D</button>
             </div>
             
             <div class="label-heading">Drone Complement</div>
             <div class="mode-group">
                <button class="mode-btn active" data-mode="Pa">Pa (Pancham)</button>
                <button class="mode-btn" data-mode="Ma">Ma (Madhyam)</button>
                <button class="mode-btn" data-mode="Ni">Ni (Nishad)</button>
             </div>
        </div>

        <button id="play-btn" class="glass action-btn">Play Drone</button>
    </main>
