<body>
    <div class="header-container tool-header">
    
        <div class="tool-nav-wrapper">
            <a href="/" class="brand-link">Dhwani</a>
            <span class="tool-name-label">Instrument Tuner</span>
        </div>
    

    
    <button aria-label="Toggle Dark Mode" class="theme-btn-header theme-toggle">
        <!-- Sun Icon (Visible in Dark Mode) -->
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>

            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>
    
</div>


    <main class="tuner-container">
        <div class="arc-meter">
             <div class="needle-base">
                <div id="needle" class="needle"></div>
             </div>
             <div class="scale">
                <span>-50</span>
                <span>0</span>
                <span>+50</span>
             </div>
        </div>

        <div class="note-display glass">
            <span id="current-note">--</span>
            <span id="current-octave">..</span>
        </div>

        <div id="detailed-info">
            <span id="frequency-display">0.0 Hz</span>
            <span id="cents-display">0 cents</span>
        </div>
        
        <button id="start-btn" class="glass action-btn">Start Tuning</button>
    </main>

    <footer class="footer">
    
</footer>
