name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual trigger button for safety

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure recent npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Prepare Packages (Copy README & LICENSE)
        run: |
          for pkg in packages/dhwani packages/chromatic-tuner packages/dhwani-metronome; do
            if [ -d "$pkg" ]; then
              cp README.md "$pkg/" || true
              cp LICENSE "$pkg/" || true
            fi
          done

      - name: Run tests (optional)
        run: npm test --if-present

      - name: Publish Dhwani to npm
        run: npm publish --workspace=dhwani --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Chromatic Tuner to npm
        run: npm publish --workspace=chromatic-tuner --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Metronome to npm
        run: npm publish --workspace=dhwani-metronome --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}